<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漁海況速報系統｜農業部水產試驗所</title>
<meta name="description" content="衛星遙測漁海況速報系統：JMA 海表水溫、水下水溫與表層海流每日分析，互動式專業海況圖台。">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header">
  <div class="brand">
    <div class="brand-mark">🛰️</div>
    <div class="brand-text">
      <h1>漁海況速報系統 <span class="ver">Ocean Conditions Monitor</span></h1>
      <p>農業部水產試驗所 漁海況研究小組｜資料來源：日本氣象廳 (JMA) NEAR-GOOS</p>
    </div>
  </div>
  <div class="header-status" id="headerStatus">
    <span class="dot"></span><span id="statusText">載入中…</span>
  </div>
</header>

<div class="app-body">

  <aside class="sidebar" id="sidebar">

    <section class="panel">
      <h2 class="panel-title">資料產品</h2>
      <div class="product-tabs" role="tablist">
        <button class="ptab active" data-product="himsst" role="tab">海表水溫</button>
        <button class="ptab" data-product="nprsubt" role="tab">水下水溫</button>
        <button class="ptab" data-product="nprsubc" role="tab">表層海流</button>
      </div>
      <p class="product-desc" id="productDesc">高解析度合成海表水溫 (HIMSST)，0.1°×0.1° 每日分析。</p>
    </section>

    <section class="panel">
      <h2 class="panel-title">分析日期</h2>
      <select id="dateSelect" class="input-full"></select>
      <div id="depthRow" class="chip-row hidden">
        <span class="chip-label">深度</span>
        <div class="chips" id="depthChips"></div>
      </div>
    </section>

    <section class="panel" id="isoPanel">
      <h2 class="panel-title">等溫線</h2>
      <label class="check-row"><input type="checkbox" id="isoToggle" checked><span>顯示等溫線</span></label>
      <div class="opt-row">
        <label>間距</label>
        <select id="isoInterval">
          <option value="0.5">0.5°C</option>
          <option value="1">1°C</option>
          <option value="2" selected>2°C</option>
          <option value="5">5°C</option>
        </select>
      </div>
      <label class="check-row"><input type="checkbox" id="isoLabels" checked><span>顯示數值標籤</span></label>
    </section>

    <section class="panel" id="currentPanel">
      <h2 class="panel-title">海流疊加</h2>
      <label class="check-row"><input type="checkbox" id="currentToggle"><span>疊加海流向量</span></label>
      <p class="hint" id="currentHint"></p>
    </section>

    <section class="panel">
      <h2 class="panel-title">溫差比較</h2>
      <label class="check-row"><input type="checkbox" id="compareToggle"><span>與基準日比較（本日 − 基準日）</span></label>
      <div class="opt-row">
        <label>基準日</label>
        <select id="compareDate"></select>
      </div>
      <div class="opt-row">
        <label>色階範圍</label>
        <select id="compareRange">
          <option value="1">±1°C</option>
          <option value="2" selected>±2°C</option>
          <option value="3">±3°C</option>
          <option value="5">±5°C</option>
        </select>
      </div>
    </section>

    <section class="panel">
      <h2 class="panel-title">顯示設定</h2>
      <div class="opt-row">
        <label>色階</label>
        <select id="cmapSelect">
          <option value="jet" selected>Jet（傳統）</option>
          <option value="turbo">Turbo</option>
        </select>
      </div>
      <div class="opt-row">
        <label>範圍</label>
        <div class="range-pair">
          <input type="number" id="vminInput" step="1" value="0"> ～
          <input type="number" id="vmaxInput" step="1" value="32"> °C
        </div>
      </div>
      <div class="opt-row">
        <label>透明度</label>
        <input type="range" id="opacitySlider" min="20" max="100" value="90">
      </div>
    </section>

    <section class="panel meta-panel">
      <h2 class="panel-title">資料狀態</h2>
      <div id="dataMeta" class="meta-text">—</div>
    </section>

  </aside>

  <main class="map-wrap">
    <button class="sidebar-toggle" id="sidebarToggle" title="收合控制面板">◀</button>
    <div id="map"></div>
    <canvas id="fieldCanvas"></canvas>

    <div class="readout" id="readout">
      <div class="readout-title" id="readoutTitle">移動滑鼠讀取數值</div>
      <div class="readout-body" id="readoutBody"></div>
    </div>

    <div class="colorbar-box">
      <canvas id="colorbar" width="280" height="14"></canvas>
      <div class="colorbar-ticks" id="colorbarTicks"></div>
      <div class="colorbar-title" id="colorbarTitle">海表水溫 (°C)</div>
    </div>

    <div class="loading-overlay hidden" id="loading"><div class="spinner"></div><div id="loadingText">資料載入中…</div></div>

    <div class="error-banner hidden" id="errorBanner"></div>
  </main>

</div>

<footer class="app-footer">
  <div>
    資料來源：
    <a href="https://www.data.jma.go.jp/goos/data/pub/JMA-product/him_sst_pac_D/" target="_blank" rel="noopener">JMA HIMSST</a>・
    <a href="https://www.data.jma.go.jp/goos/data/pub/JMA-product/npr_subt_jpn_D/" target="_blank" rel="noopener">NPRSUBT</a>・
    <a href="https://www.data.jma.go.jp/goos/data/pub/JMA-product/npr_subc_jpn_D/" target="_blank" rel="noopener">NPRSUBC</a>
    ｜每日自動更新
  </div>
  <div>© 2026 農業部水產試驗所 漁海況研究小組</div>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
